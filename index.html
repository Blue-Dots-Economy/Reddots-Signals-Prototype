      @keyframes pulse-ring {
        0% { transform: scale(1); opacity: 0.6; }
        100% { transform: scale(1.8); opacity: 0; }
      }
      .leaflet-popup-content-wrapper { background: #ffffff !important; box-shadow: 0 4px 20px rgba(0,0,0,0.12) !important; padding: 0 !important; border-radius: 12px !important; border: 1.5px solid #DC143C !important; }
      .leaflet-popup-content { margin: 0 !important; }
      .leaflet-popup-tip { display: none !important; }
      .devendra-tooltip { background: white !important; color: #0F172A !important; font-weight: 600 !important; font-size: 11px !important; border: 1px solid #E2E8F0 !important; border-radius: 6px !important; padding: 2px 8px !important; box-shadow: 0 2px 6px rgba(0,0,0,0.1) !important; }
      .devendra-tooltip::before { border-bottom-color: white !important; }
    </style>
